{% extends "navbar.html" %}

{% block title %}Inicio - Runners Starlink{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<script defer src="{{ url_for('static', filename='js/login.js') }}"></script>

<main class="login-container" aria-live="polite">
  <form id="login-form" class="login-card" autocomplete="off" novalidate>
    <h2>Iniciar sesión</h2>

    <label for="email">Correo</label>
    <input id="email" name="correo" type="email" placeholder="tucorreo@ejemplo.com" required>

    <label for="password">Contraseña</label>
    <input id="password" name="contrasena" type="password" placeholder="••••••••" required>

    <div class="actions">
      <button type="submit" class="btn">Entrar</button>
    </div>

    <p id="error-msg" class="error" role="alert" aria-hidden="true"></p>
  </form>
</main>
{% endblock %}
